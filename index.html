<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#06070a" />
    <meta name="description" content="ZentryOS Parent Dashboard - Consola Web PWA de Control Parental, Telemetría Cognitiva y Kill-Switch Remoto en Tiempo Real (GCP / Firestore)" />
    
    <!-- PWA & Mobile Web App Capable -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zentry Padres" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <title>ZentryOS • Dashboard para Padres</title>
  </head>
  <body class="bg-[#06070a] text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
